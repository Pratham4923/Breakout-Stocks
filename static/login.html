<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AstraVeda | Open Terminal</title>
  <link rel="icon" type="image/png" href="/static/Favicon.png?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/auth.js" defer></script>
</head>
<body>
  <div class="noise"></div>
  <div class="glow-orb orb-1"></div>
  <div class="glow-orb orb-2"></div>

  <main class="auth-page">
    <div class="noise"></div>
    <div class="glow-orb orb-1" style="position: fixed; top: -100px; right: -100px; width: 400px; height: 400px; background: var(--accent); filter: blur(100px); opacity: 0.1; z-index: -1;"></div>
    
    <div class="glass-card auth-card">
      <header style="text-align: center; margin-bottom: 40px;">
        <img src="/static/Logo.png" alt="AstraVeda logo" style="width: 64px; height: 64px; margin-bottom: 24px; object-fit: contain;">
        <span class="eyebrow">Institutional Access</span>
        <h1 class="font-serif" style="font-size: 2.5rem;">Enter Terminal.</h1>
        <p style="color: var(--text-soft); font-size: 0.9rem;">Review risk. Execute logic. Maintain edge.</p>
      </header>

      <form id="auth-form" data-auth-mode="login">
        <div class="field">
          <label for="auth-identifier">Credential</label>
          <input id="auth-identifier" type="text" placeholder="Username or Email" required autocomplete="username">
        </div>
        <div class="field">
          <label for="auth-password">Institutional Key</label>
          <input id="auth-password" type="password" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <div id="auth-error" style="color: var(--danger); font-size: 0.8rem; margin-bottom: 20px; text-align: center; min-height: 1.2em;"></div>

        <button id="auth-submit" class="btn btn-primary" type="submit" style="width: 100%; height: 54px; font-size: 1rem;">
          <span id="auth-submit-label">Open Terminal</span>
        </button>
      </form>

      <footer style="text-align: center; margin-top: 32px; font-size: 0.85rem;">
        <p style="color: var(--text-muted); margin-bottom: 12px;">
          New to AstraVeda? <a href="/create-account" style="color: var(--accent); font-weight: 600;">Create Account</a>
        </p>
        <a href="/" style="color: var(--text-dim);">Return to Landing</a>
      </footer>
    </div>
  </main>
</body>
</html>
